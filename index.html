<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MFM STUDIO - CINEMATIC EDITION</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: #fff; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
        }
        audio {
            filter: invert(1) hue-rotate(100deg) brightness(1.5);
            width: 100%;
            height: 40px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const VOICES = [
            { id: 'Kore', name: 'Kyi Pyar', label: 'ကြည်ပြာ (Female)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=KyiPyar' },
            { id: 'Aoede', name: 'Khing War', label: 'ခိုင်ဝါ (Female)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=KhingWar' },
            { id: 'Leda', name: 'Nan San', label: 'နန်းစံ (Female)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=NanSan' },
            { id: 'Callirrhoe', name: 'May Thazin', label: 'မေသဇင် (Female)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=MayThazin' },
            { id: 'Puck', name: 'Mg Mg', label: 'မောင်မောင် (Male)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=MgMg' },
            { id: 'Charon', name: 'Aung Aung', label: 'အောင်အောင် (Male)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=AungAung' },
            { id: 'Fenrir', name: 'U Thant', label: 'ဦးသန့် (Male)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=UThant' },
            { id: 'Orus', name: 'Htet Arkar', label: 'ထက်အာကာ (Male)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=HtetArkar' }
        ];

        function App() {
            const [apiKey, setApiKey] = useState('');
            const [showSettings, setShowSettings] = useState(false);
            const [blocks, setBlocks] = useState([{ id: Date.now(), text: '', voice: VOICES[0], audio: null, loading: false }]);

            useEffect(() => {
                const savedKey = localStorage.getItem('mfm_studio_key');
                if (savedKey) setApiKey(savedKey);
                else setShowSettings(true);
            }, []);

            const saveApiKey = (val) => {
                setApiKey(val);
                localStorage.setItem('mfm_studio_key', val);
                setShowSettings(false);
            };

            const fetchTTS = async (text, voiceId) => {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text }] }],
                        generationConfig: { 
                            responseModalities: ["AUDIO"], 
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceId } } }
                        }
                    })
                });
                const data = await response.json();
                const b64 = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                if (!b64) throw new Error("API Key မှားနေပါသည်။");
                const bin = atob(b64);
                const pcm = new Int16Array(bin.length / 2);
                for (let i = 0; i < bin.length; i += 2) pcm[i / 2] = (bin.charCodeAt(i + 1) << 8) | bin.charCodeAt(i);
                return pcm;
            };

            const convertToWav = (pcmData) => {
                const buffer = new ArrayBuffer(44 + pcmData.length * 2);
                const view = new DataView(buffer);
                const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
                writeStr(0, 'RIFF'); view.setUint32(4, 32 + pcmData.length * 2, true);
                writeStr(8, 'WAVE'); writeStr(12, 'fmt ');
                view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
                view.setUint32(24, 24000, true); view.setUint32(28, 48000, true);
                view.setUint16(32, 2, true); view.setUint16(34, 16, true);
                writeStr(36, 'data'); view.setUint32(40, pcmData.length * 2, true);
                for (let i = 0; i < pcmData.length; i++) view.setInt16(44 + i * 2, pcmData[i], true);
                return new Blob([buffer], { type: 'audio/wav' });
            };

            const generateVoice = async (id) => {
                const b = blocks.find(x => x.id === id);
                setBlocks(prev => prev.map(x => x.id === id ? { ...x, loading: true } : x));
                try {
                    const pcm = await fetchTTS(b.text, b.voice.id);
                    setBlocks(prev => prev.map(x => x.id === id ? { ...x, audio: URL.createObjectURL(convertToWav(pcm)), loading: false } : x));
                } catch (e) { alert(e.message); setBlocks(prev => prev.map(x => x.id === id ? { ...x, loading: false } : x)); }
            };

            return (
                <div className="max-w-xl mx-auto p-4 pb-10 min-h-screen">
                    <header className="flex justify-between items-center py-6">
                        <h1 className="font-black italic text-xl uppercase">MFM <span className="text-green-500">Studio</span></h1>
                        <button onClick={() => setShowSettings(true)} className="text-zinc-500"><i className="fa-solid fa-gear"></i></button>
                    </header>

                    <div className="space-y-6">
                        {blocks.map((b) => (
                            <div key={b.id} className="glass-card p-6 border-white/5">
                                <div className="flex items-center gap-4 mb-4">
                                    <img src={b.voice.avatar} className="w-12 h-12 rounded-xl border border-green-500/20" />
                                    <div>
                                        <div className="text-sm font-bold text-white">{b.voice.name}</div>
                                        <div className="text-[10px] text-zinc-500 uppercase">{b.voice.label}</div>
                                    </div>
                                </div>
                                <select 
                                    className="w-full bg-zinc-900 border border-white/5 rounded-xl p-3 text-xs text-white mb-4 outline-none"
                                    value={b.voice.id}
                                    onChange={(e) => setBlocks(blocks.map(x => x.id === b.id ? {...x, voice: VOICES.find(v => v.id === e.target.value)} : x))}
                                >
                                    {VOICES.map(v => <option key={v.id} value={v.id}>{v.label}</option>)}
                                </select>
                                <textarea 
                                    className="w-full bg-transparent border-b border-white/10 p-2 text-sm outline-none min-h-[100px] mb-4"
                                    placeholder="စာသားရိုက်ပါ..."
                                    value={b.text}
                                    onChange={(e) => setBlocks(blocks.map(x => x.id === b.id ? {...x, text: e.target.value} : x))}
                                />
                                {b.audio && <audio src={b.audio} controls className="mb-4" />}
                                <button 
                                    onClick={() => generateVoice(b.id)}
                                    disabled={b.loading || !apiKey}
                                    className="w-full py-4 bg-white text-black font-black text-[10px] uppercase rounded-xl"
                                >
                                    {b.loading ? "Generating..." : "Generate Voice"}
                                </button>
                            </div>
                        ))}
                    </div>

                    {showSettings && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/90 backdrop-blur-md">
                            <div className="w-full max-w-sm glass-card p-8 text-center border-green-500/30">
                                <h2 className="text-xl font-black uppercase mb-6">API <span className="text-green-500">Access</span></h2>
                                <input 
                                    type="password" id="k" defaultValue={apiKey}
                                    className="w-full bg-zinc-950 border border-white/10 rounded-xl p-4 text-center text-sm outline-none mb-4"
                                    placeholder="Paste API Key Here..."
                                />
                                <button 
                                    onClick={() => saveApiKey(document.getElementById('k').value)}
                                    className="w-full py-4 bg-green-500 text-black font-black text-[10px] uppercase rounded-xl"
                                >
                                    Save & Start
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
