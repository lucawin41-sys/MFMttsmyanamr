<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MFM STUDIO - CINEMATIC EDITION</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505;

        }

        .logo-glow {
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
        }

        input, select, textarea {
            font-size: 16px !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const VOICES = [
            { id: 'Kore', name: 'Kyi Pyar', label: 'ကြည်ပြာ (Female)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=KyiPyar' },
            { id: 'Aoede', name: 'Khing War', label: 'ခိုင်ဝါ (Female)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=KhingWar' },
            { id: 'Leda', name: 'Nan San', label: 'နန်းစံ (Female)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=NanSan' },
            { id: 'Callirrhoe', name: 'May Thazin', label: 'မေသဇင် (Female)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=MayThazin' },
            { id: 'Puck', name: 'Mg Mg', label: 'မောင်မောင် (Male)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=MgMg' },
            { id: 'Charon', name: 'Aung Aung', label: 'အောင်အောင် (Male)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=AungAung' },
            { id: 'Fenrir', name: 'U Thant', label: 'ဦးသန့် (Male)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=UThant' },
            { id: 'Orus', name: 'Htet Arkar', label: 'ထက်အာကာ (Male)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=HtetArkar' }
        ];

        function App() {
            const [apiKey, setApiKey] = useState('');
            const [showSettings, setShowSettings] = useState(false);
            const [mode, setMode] = useState('solo');
            const [blocks, setBlocks] = useState([
                { id: Date.now(), text: '', voice: VOICES[0], audio: null, loading: false }
            ]);
            const [fullAudio, setFullAudio] = useState(null);
            const [fullLoading, setFullLoading] = useState(false);
            const [error, setError] = useState(null);

            useEffect(() => {
                const savedKey = localStorage.getItem('mfm_studio_key');
                if (savedKey) {
                    setApiKey(savedKey);
                } else {
                    setShowSettings(true);
                }
            }, []);

            const saveApiKey = (val) => {
                if (!val) return;
                setApiKey(val);
                localStorage.setItem('mfm_studio_key', val);
                setShowSettings(false);
                setError(null);
            };

            const download = (url, filename) => {
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
            };

            const fetchTTS = async (text, voiceId) => {
                if (!apiKey) throw new Error("API Key လိုအပ်ပါသည်။ Settings တွင် သွားထည့်ပါ။");
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text }] }],
                        generationConfig: { 
                            responseModalities: ["AUDIO"], 
                            speechConfig: { 
                                voiceConfig: { 
                                    prebuiltVoiceConfig: { 
                                        voiceName: voiceId 
                                    } 
                                } 
                            } 
                        }
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message || "API အမှားအယွင်းရှိပါသည်။");
                }

                const base64Audio = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                if (!base64Audio) throw new Error("အသံဖိုင် မရရှိပါ။ API Key ကို စစ်ဆေးပါ။");

                const binaryString = atob(base64Audio);
                const pcmData = new Int16Array(binaryString.length / 2);
                for (let i = 0; i < binaryString.length; i += 2) {
                    pcmData[i / 2] = (binaryString.charCodeAt(i + 1) << 8) | binaryString.charCodeAt(i);
                }
                return pcmData;
            };

            const convertToWav = (pcmData) => {
                const buffer = new ArrayBuffer(44 + pcmData.length * 2);
                const view = new DataView(buffer);
                const writeString = (offset, string) => {
                    for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
                };
                writeString(0, 'RIFF');
                view.setUint32(4, 32 + pcmData.length * 2, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, 24000, true);
                view.setUint32(28, 48000, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(36, 'data');
                view.setUint32(40, pcmData.length * 2, true);
                for (let i = 0; i < pcmData.length; i++) {
                    view.setInt16(44 + i * 2, pcmData[i], true);
                }
                return new Blob([buffer], { type: 'audio/wav' });
            };

            const generateSoloVoice = async (id) => {
                const block = blocks.find(b => b.id === id);
                if (!block.text.trim()) return;

                setBlocks(prev => prev.map(b => b.id === id ? { ...b, loading: true } : b));
                try {
                    const pcm = await fetchTTS(block.text, block.voice.id);
                    const blob = convertToWav(pcm);
                    const url = URL.createObjectURL(blob);
                    setBlocks(prev => prev.map(b => b.id === id ? { ...b, audio: url, loading: false } : b));
                } catch (err) {
                    setError(err.message);
                    setBlocks(prev => prev.map(b => b.id === id ? { ...b, loading: false } : b));
                }
            };

            const generateCinematicFull = async () => {
                setFullLoading(true);
                setFullAudio(null);
                try {
                    const pcmChunks = [];
                    for (const block of blocks) {
                        if (block.text.trim()) {
                            const pcm = await fetchTTS(block.text, block.voice.id);
                            pcmChunks.push(pcm);
                            // Add 0.5s silence between voices
                            pcmChunks.push(new Int16Array(12000).fill(0)); 
                        }
                    }
                    const totalLength = pcmChunks.reduce((acc, chunk) => acc + chunk.length, 0);
                    const mergedPcm = new Int16Array(totalLength);
                    let offset = 0;
                    for (const chunk of pcmChunks) {
                        mergedPcm.set(chunk, offset);
                        offset += chunk.length;
                    }
                    const blob = convertToWav(mergedPcm);
                    setFullAudio(URL.createObjectURL(blob));
                } catch (err) {
                    setError(err.message);
                } finally {
                    setFullLoading(false);
                }
            };

            return (
                <div className="max-w-xl mx-auto p-4 pb-48 min-h-screen">
                    <header className="flex justify-between items-center py-6">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-green-500 rounded-xl flex items-center justify-center logo-glow">
                                <i className="fa-solid fa-wand-magic-sparkles text-black"></i>
                            </div>
                            <h1 className="font-black italic text-xl tracking-tighter uppercase">
                                MFM <span className="text-green-500">Studio</span>
                            </h1>
                        </div>
                        <button onClick={() => setShowSettings(true)} className="w-10 h-10 rounded-full hover:bg-white/5 flex items-center justify-center text-zinc-500">
                            <i className="fa-solid fa-gear"></i>
                        </button>
                    </header>

                    {error && (
                        <div className="p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-[11px] text-red-400 mb-6 flex items-center gap-3">
                            <i className="fa-solid fa-circle-exclamation"></i>
                            <span className="flex-1">{error}</span>
                            <button onClick={() => setError(null)}><i className="fa-solid fa-xmark"></i></button>
                        </div>
                    )}

                    <div className="flex bg-zinc-900/50 p-1 rounded-2xl mb-8 border border-white/5">
                        <button 
                            onClick={() => setMode('solo')}
                            className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${mode === 'solo' ? 'bg-white text-black' : 'text-zinc-500 hover:text-white'}`}
                        >
                            Solo Voice
                        </button>
                        <button 
                            onClick={() => setMode('drama')}
                            className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${mode === 'drama' ? 'bg-green-500 text-black' : 'text-zinc-500 hover:text-white'}`}
                        >
                            Cinematic Mix
                        </button>
                    </div>

                    <div className="space-y-6">
                        {blocks.map((block, index) => (
                            <div key={block.id} className="glass-card p-6 relative group border-white/5 hover:border-green-500/20 transition-all">
                                <div className="flex items-center justify-between mb-5">
                                    <div className="flex items-center gap-4">
                                        <div className="relative">
                                            <img src={block.voice.avatar} className="w-14 h-14 rounded-2xl border-2 border-green-500/20" />
                                            <div className="absolute -bottom-1 -right-1 w-5 h-5 bg-green-500 rounded-full border-2 border-black flex items-center justify-center text-[8px] text-black font-black italic">
                                                {index + 1}
                                            </div>
                                        </div>
                                        <div>
                                            <h3 className="text-sm font-black text-white">{block.voice.name}</h3>
                                            <p className="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">{block.voice.label}</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        <button 
                                            onClick={() => {
                                                const testTxt = `မင်္ဂလာပါ။ ${block.voice.name} မှ အသံစမ်းသပ်ပေးနေခြင်း ဖြစ်ပါသည်။`;
                                                fetchTTS(testTxt, block.voice.id).then(pcm => {
                                                    const audio = new Audio(URL.createObjectURL(convertToWav(pcm)));
                                                    audio.play();
                                                });
                                            }}
                                            className="w-8 h-8 rounded-lg bg-zinc-800 text-[10px] flex items-center justify-center hover:bg-green-500 hover:text-black transition-all"
                                            title="Test Voice"
                                        >
                                            <i className="fa-solid fa-volume-high"></i>
                                        </button>
                                        {blocks.length > 1 && (
                                            <button 
                                                onClick={() => setBlocks(blocks.filter(b => b.id !== block.id))}
                                                className="w-8 h-8 rounded-lg bg-red-500/10 text-red-500 text-[10px] flex items-center justify-center hover:bg-red-500 hover:text-white transition-all"
                                            >
                                                <i className="fa-solid fa-trash-can"></i>
                                            </button>
                                        )}
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <select 
                                        className="w-full bg-zinc-950/50 border border-white/5 rounded-xl p-3 text-xs font-bold text-white outline-none focus:border-green-500 transition-all"
                                        value={block.voice.id}
                                        onChange={(e) => setBlocks(blocks.map(b => b.id === block.id ? { ...b, voice: VOICES.find(v => v.id === e.target.value) } : b))}
                                    >
                                        {VOICES.map(v => <option key={v.id} value={v.id}>{v.label}</option>)}
                                    </select>

                                    <textarea 
                                        className="w-full bg-transparent border-b border-white/10 focus:border-green-500 p-2 text-sm text-zinc-200 outline-none min-h-[100px] resize-none leading-relaxed transition-all"
                                        placeholder="ပြောလိုသော မြန်မာစာသားများကို ဤနေရာတွင် ရိုက်ထည့်ပါ..."
                                        value={block.text}
                                        onChange={(e) => setBlocks(blocks.map(b => b.id === block.id ? { ...b, text: e.target.value } : b))}
                                    />

                                    {mode === 'solo' && (
                                        <div className="mt-4 space-y-4">
                                            {block.audio && (
                                                <div className="flex items-center gap-3 bg-zinc-950/50 p-3 rounded-2xl border border-white/5 animate-fade-in">
                                                    <audio src={block.audio} controls className="flex-1" />
                                                    <button 
                                                        onClick={() => download(block.audio, `Solo_${block.voice.name}.wav`)}
                                                        className="w-10 h-10 bg-zinc-800 rounded-xl flex items-center justify-center hover:bg-green-500 hover:text-black transition-all"
                                                    >
                                                        <i className="fa-solid fa-download text-xs"></i>
                                                    </button>
                                                </div>
                                            )}
                                            <button 
                                                onClick={() => generateSoloVoice(block.id)}
                                                disabled={block.loading || !block.text.trim() || !apiKey}
                                                className="w-full py-4 bg-white text-black font-black text-[10px] uppercase tracking-[0.2em] rounded-2xl active:scale-[0.98] disabled:opacity-20 transition-all flex items-center justify-center gap-3"
                                            >
                                                {block.loading ? <i className="fa-solid fa-circle-notch animate-spin"></i> : <i className="fa-solid fa-play"></i>}
                                                {block.loading ? "Generating..." : "Generate Voice"}
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        ))}

                        <button 
                            onClick={() => setBlocks([...blocks, { id: Date.now(), text: '', voice: VOICES[0], audio: null, loading: false }])}
                            className="w-full py-8 border-2 border-dashed border-white/5 rounded-[2rem] text-zinc-600 flex flex-col items-center gap-2 hover:border-green-500/40 hover:text-green-500 transition-all group"
                        >
                            <i className="fa-solid fa-plus text-xl group-hover:scale-125 transition-transform"></i>
                            <span className="text-[10px] font-black uppercase tracking-[0.3em]">Add Next Line</span>
                        </button>
                    </div>

                    {mode === 'drama' && (
                        <div className="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-black via-black/90 to-transparent z-40">
                            <div className="max-w-xl mx-auto space-y-4">
                                {fullAudio && (
                                    <div className="glass-card p-4 animate-slide-up border-green-500/30 overflow-hidden shadow-2xl">
                                        <p className="text-[8px] text-zinc-500 font-black uppercase mb-3 text-center tracking-[0.5em]">Full Cinematic Ready</p>
                                        <div className="flex items-center gap-4">
                                            <audio src={fullAudio} controls className="flex-1" />
                                            <button 
                                                onClick={() => download(fullAudio, "MFM_Cinematic_Mix.wav")}
                                                className="w-14 h-12 bg-green-500 text-black rounded-2xl flex items-center justify-center hover:scale-105 transition-all shadow-lg glow-btn"
                                            >
                                                <i className="fa-solid fa-cloud-arrow-down text-lg"></i>
                                            </button>
                                        </div>
                                    </div>
                                )}
                                <button 
                                    onClick={generateCinematicFull}
                                    disabled={fullLoading || !apiKey || blocks.every(b => !b.text.trim())}
                                    className="w-full py-6 bg-white text-black font-black uppercase text-[11px] tracking-[0.3em] rounded-[2.5rem] shadow-2xl active:scale-95 transition-all disabled:opacity-30 flex items-center justify-center gap-4"
                                >
                                    {fullLoading ? <i className="fa-solid fa-circle-notch animate-spin text-lg"></i> : <i className="fa-solid fa-film text-lg text-green-600"></i>}
                                    {fullLoading ? "Rendering Voices..." : "Export Full Cinematic Mix"}
                                </button>
                            </div>
                        </div>
                    )}

                    {showSettings && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/90 backdrop-blur-md">
                            <div className="w-full max-w-sm glass-card p-10 text-center relative overflow-hidden border-green-500/30">
                                <div className="absolute -top-10 -right-10 w-32 h-32 bg-green-500/10 rounded-full blur-3xl"></div>
                                
                                <div className="w-16 h-16 bg-green-500/10 rounded-2xl flex items-center justify-center mx-auto mb-8 border border-green-500/20">
                                    <i className="fa-solid fa-key text-green-500 text-2xl"></i>
                                </div>
                                
                                <h2 className="text-xl font-black italic uppercase tracking-tighter mb-2">
                                    Access <span className="text-green-500">Settings</span>
                                </h2>
                                <p className="text-[10px] text-zinc-500 font-bold uppercase tracking-[0.2em] mb-8 leading-relaxed">
                                    အသုံးပြုရန် သင်၏ Gemini API Key ကို ထည့်ပေးပါ။
                                </p>
                                
                                <input 
                                    type="password" 
                                    id="keyField"
                                    defaultValue={apiKey}
                                    className="w-full bg-zinc-950 border border-white/10 rounded-2xl p-4 text-center text-sm outline-none focus:border-green-500 transition-all mb-4 text-green-400 placeholder:text-zinc-800"
                                    placeholder="Paste API Key Here..."
                                />
                                
                                <button 
                                    onClick={() => {
                                        const val = document.getElementById('keyField').value;
                                        saveApiKey(val);
                                    }}
                                    className="w-full py-4 bg-green-500 text-black font-black text-[10px] uppercase tracking-[0.3em] rounded-xl hover:bg-green-400 transition-all mb-4 glow-btn"
                                >
                                    Save & Continue
                                </button>
                                
                                <div className="flex flex-col gap-2 pt-4">
                                    <a href="https://aistudio.google.com/app/apikey" target="_blank" className="text-[9px] text-zinc-500 underline hover:text-green-500 transition-colors">
                                        API Key အခမဲ့ရယူရန် ဤနေရာကိုနှိပ်ပါ
                                    </a>
                                    {apiKey && (
                                        <button onClick={() => setShowSettings(false)} className="text-[9px] text-zinc-700 font-bold uppercase tracking-widest mt-4">
                                            Close
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
