<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MFM STUDIO - CINEMATIC EDITION</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: #fff; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
        }

        .green-gradient {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
        }

        audio {
            filter: invert(1) hue-rotate(100deg) brightness(1.5);
            width: 100%;
            height: 38px;
        }

        .character-img {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            border: 2px solid #22c55e;
            object-fit: cover;
            background: #111;
        }

        .preview-btn {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .logo-box {
            width: 50px;
            height: 50px;
            border: 2px solid #22c55e;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
        }
        
        .sticky-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, #000 70%, transparent);
            padding: 20px;
            z-index: 50;
        }

        /* Animation for Key Input */
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const VOICES = [
            { id: 'Kore', name: 'Kyi Pyar', label: 'ကြည်ပြာ (Female)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=KyiPyar' },
            { id: 'Aoede', name: 'Khing War', label: 'ခိုင်ဝါ (Female)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=KhingWar' },
            { id: 'Leda', name: 'Nan San', label: 'နန်းစံ (Female)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=NanSan' },
            { id: 'Callirrhoe', name: 'May Thazin', label: 'မေသဇင် (Female)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=MayThazin' },
            { id: 'Puck', name: 'Mg Mg', label: 'မောင်မောင် (Male)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=MgMg' },
            { id: 'Charon', name: 'Aung Aung', label: 'အောင်အောင် (Male)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=AungAung' },
            { id: 'Fenrir', name: 'U Thant', label: 'ဦးသန့် (Male)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=UThant' },
            { id: 'Orus', name: 'Htet Arkar', label: 'ထက်အာကာ (Male)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=HtetArkar' }
        ];

        function App() {
            // Security State
            const [apiKey, setApiKey] = useState("");
            const [isAuthorized, setIsAuthorized] = useState(false);
            const [tempKey, setTempKey] = useState("");

            // Original State
            const [mode, setMode] = useState('solo');
            const [blocks, setBlocks] = useState([{ 
                id: Date.now(), 
                text: '', 
                voice: VOICES[0], 
                audio: null, 
                loading: false, 
                previewLoading: false,
                error: null
            }]);

            const [fullAudio, setFullAudio] = useState(null);
            const [fullLoading, setFullLoading] = useState(false);

            const handleLogin = (e) => {
                e.preventDefault();
                if (tempKey.trim().length > 10) {
                    setApiKey(tempKey);
                    setIsAuthorized(true);
                }
            };

            const convertToWav = (pcmData) => {
                const buffer = new ArrayBuffer(44 + pcmData.length * 2);
                const view = new DataView(buffer);
                const writeString = (offset, string) => {
                    for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
                };
                writeString(0, 'RIFF');
                view.setUint32(4, 32 + pcmData.length * 2, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, 24000, true);
                view.setUint32(28, 48000, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(36, 'data');
                view.setUint32(40, pcmData.length * 2, true);
                for (let i = 0; i < pcmData.length; i++) view.setInt16(44 + i * 2, pcmData[i], true);
                return new Blob([buffer], { type: 'audio/wav' });
            };

            const generateTTSChunk = async (text, voiceId) => {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }],
                        generationConfig: { 
                            responseModalities: ["AUDIO"], 
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceId } } }
                        }
                    })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                const b64 = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                if (!b64) return null;
                const bin = atob(b64);
                const pcm = new Int16Array(bin.length / 2);
                for (let i = 0; i < bin.length; i += 2) pcm[i / 2] = (bin.charCodeAt(i + 1) << 8) | bin.charCodeAt(i);
                return pcm;
            };

            const generateSoloTTS = async (id, isPreview = false) => {
                const b = blocks.find(x => x.id === id);
                const inputText = isPreview ? `မင်္ဂလာပါ။ ${b.voice.name} မှ အသံစမ်းသပ်ပေးနေခြင်း ဖြစ်ပါသည်။` : b.text;
                if (!isPreview && !inputText.trim()) return;

                setBlocks(prev => prev.map(x => x.id === id ? { ...x, previewLoading: isPreview, loading: !isPreview, error: null } : x));

                try {
                    const pcm = await generateTTSChunk(inputText, b.voice.id);
                    if (!pcm) throw new Error("Audio generation failed.");
                    const wavBlob = convertToWav(pcm);
                    const url = URL.createObjectURL(wavBlob);

                    if (isPreview) {
                        new Audio(url).play();
                        setBlocks(prev => prev.map(x => x.id === id ? { ...x, previewLoading: false } : x));
                    } else {
                        setBlocks(prev => prev.map(x => x.id === id ? { ...x, audio: url, loading: false } : x));
                    }
                } catch (e) {
                    setBlocks(prev => prev.map(x => x.id === id ? { ...x, loading: false, previewLoading: false, error: e.message } : x));
                    console.error("TTS Error:", e);
                }
            };

            const generateCinematicFull = async () => {
                const validBlocks = blocks.filter(b => b.text.trim());
                if (validBlocks.length === 0) return;

                setFullLoading(true);
                setFullAudio(null);

                try {
                    const pcmChunks = [];
                    for (const block of validBlocks) {
                        const pcm = await generateTTSChunk(block.text, block.voice.id);
                        if (pcm) {
                            pcmChunks.push(pcm);
                            pcmChunks.push(new Int16Array(24000 * 0.5).fill(0)); 
                        }
                    }

                    const totalLength = pcmChunks.reduce((acc, curr) => acc + curr.length, 0);
                    const fullPcm = new Int16Array(totalLength);
                    let offset = 0;
                    for (const chunk of pcmChunks) {
                        fullPcm.set(chunk, offset);
                        offset += chunk.length;
                    }

                    const wavBlob = convertToWav(fullPcm);
                    setFullAudio(URL.createObjectURL(wavBlob));
                } catch (e) {
                    console.error(e);
                } finally {
                    setFullLoading(false);
                }
            };

            const download = (url, name) => {
                const a = document.createElement('a');
                a.href = url;
                a.download = name || `MFM_Audio_${Date.now()}.wav`;
                a.click();
            };

            // Login Screen UI
            if (!isAuthorized) {
                return (
                    <div className="flex items-center justify-center min-h-screen p-6 fade-in">
                        <div className="glass-card w-full max-w-sm p-8 text-center border-green-500/30">
                            <div className="logo-box rounded-2xl flex items-center justify-center bg-black mx-auto mb-6">
                                <i className="fa-solid fa-lock text-2xl text-green-500"></i>
                            </div>
                            <h2 className="text-xl font-black italic tracking-tighter uppercase mb-2">ACCESS <span className="text-green-500">REQUIRED</span></h2>
                            <p className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-8">Enter Gemini API Key to continue</p>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input 
                                    type="password" 
                                    placeholder="Paste your API Key here..."
                                    value={tempKey}
                                    onChange={(e) => setTempKey(e.target.value)}
                                    className="w-full bg-black/50 border border-zinc-800 rounded-xl p-4 text-xs text-center outline-none focus:border-green-500 text-green-500 font-mono"
                                />
                                <button 
                                    type="submit"
                                    className="w-full py-4 green-gradient text-black font-black uppercase text-[10px] rounded-xl active:scale-95 transition-all"
                                >
                                    Activate Studio
                                </button>
                            </form>
                            <p className="mt-6 text-[9px] text-zinc-600 font-bold uppercase tracking-widest">MFM STUDIO CINEMATIC EDITION</p>
                        </div>
                    </div>
                );
            }

            // Original Studio UI
            return (
                <div className="max-w-xl mx-auto min-h-screen p-4 pb-48 fade-in">
                    <header className="flex flex-col items-center py-10 gap-4">
                        <div className="logo-box rounded-2xl flex items-center justify-center bg-black">
                            <i className="fa-solid fa-wand-magic-sparkles text-2xl text-green-500"></i>
                        </div>
                        <div className="text-center relative">
                            <h1 className="text-2xl font-black italic tracking-tighter uppercase">MFM <span className="text-green-500">Studio</span></h1>
                            <p className="text-[9px] font-bold text-zinc-600 uppercase tracking-[0.4em] mt-1">Cinematic Multi-Voice</p>
                            <button onClick={() => setIsAuthorized(false)} className="absolute -right-12 top-0 text-zinc-800 hover:text-red-500 transition-colors">
                                <i className="fa-solid fa-power-off text-xs"></i>
                            </button>
                        </div>
                    </header>

                    <div className="flex bg-zinc-900/50 p-1.5 rounded-[1.5rem] mb-8 border border-white/5">
                        <button onClick={() => setMode('solo')} className={`flex-1 py-3 rounded-[1.2rem] text-[11px] font-black uppercase transition-all ${mode === 'solo' ? 'bg-green-500 text-black shadow-lg shadow-green-500/20' : 'text-zinc-500'}`}>Solo Mode</button>
                        <button onClick={() => setMode('drama')} className={`flex-1 py-3 rounded-[1.2rem] text-[11px] font-black uppercase transition-all ${mode === 'drama' ? 'bg-green-500 text-black shadow-lg shadow-green-500/20' : 'text-zinc-500'}`}>Cinematic Mode</button>
                    </div>

                    <div className="space-y-6">
                        {blocks.map((b, index) => (
                            <div key={b.id} className="glass-card p-6 relative">
                                <div className="flex items-center justify-between mb-5">
                                    <div className="flex items-center gap-3">
                                        <img src={b.voice.avatar} className="character-img" />
                                        <div>
                                            <h2 className="font-black text-sm text-white">{b.voice.name}</h2>
                                            <p className="text-[10px] text-zinc-500 uppercase font-bold">{b.voice.label}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => generateSoloTTS(b.id, true)} className="preview-btn" disabled={b.previewLoading}>
                                        {b.previewLoading ? <i className="fa-solid fa-spinner animate-spin"></i> : <i className="fa-solid fa-headphones"></i>}
                                        Test
                                    </button>
                                </div>

                                <div className="space-y-4">
                                    <select 
                                        className="w-full bg-zinc-900 border border-zinc-800 text-xs font-bold p-3 rounded-xl text-white outline-none"
                                        value={b.voice.id}
                                        onChange={(e) => setBlocks(blocks.map(x => x.id === b.id ? {...x, voice: VOICES.find(v => v.id === e.target.value)} : x))}
                                    >
                                        {VOICES.map(v => <option key={v.id} value={v.id}>{v.label}</option>)}
                                    </select>

                                    <textarea 
                                        className="w-full bg-black/40 border border-zinc-800 rounded-xl p-4 text-sm outline-none focus:border-green-500 min-h-[100px]"
                                        placeholder="စာသားရိုက်ထည့်ပါ..."
                                        value={b.text}
                                        onChange={(e) => setBlocks(blocks.map(x => x.id === b.id ? {...x, text: e.target.value} : x))}
                                    />
                                    {b.error && <p className="text-[10px] text-red-500 font-bold uppercase">{b.error}</p>}
                                </div>

                                {mode === 'solo' && (
                                    <div className="mt-4 pt-4 border-t border-white/5 space-y-3">
                                        {b.audio && <audio src={b.audio} controls className="mb-2" />}
                                        <button 
                                            onClick={() => generateSoloTTS(b.id)}
                                            disabled={b.loading || !b.text.trim()}
                                            className="w-full py-4 green-gradient text-black font-black uppercase text-[10px] rounded-xl active:scale-95"
                                        >
                                            {b.loading ? "Generating..." : "Generate Solo Audio"}
                                        </button>
                                        {b.audio && (
                                            <button onClick={() => download(b.audio)} className="w-full py-3 bg-zinc-800 text-zinc-400 rounded-xl text-[10px] font-bold uppercase">
                                                Download This
                                            </button>
                                        )}
                                    </div>
                                )}
                                
                                {mode === 'drama' && (
                                    <button onClick={() => setBlocks(blocks.filter(x => x.id !== b.id))} className="absolute -top-2 -right-2 w-7 h-7 bg-red-500 rounded-full text-white text-[10px] flex items-center justify-center border-2 border-black">
                                        <i className="fa-solid fa-xmark"></i>
                                    </button>
                                )}
                            </div>
                        ))}

                        <button onClick={() => setBlocks([...blocks, { id: Date.now(), text: '', voice: VOICES[0], audio: null, loading: false, previewLoading: false }])} className="w-full py-5 border-2 border-dashed border-zinc-900 rounded-2xl text-zinc-600 text-[10px] font-black uppercase tracking-widest">
                            + Add Dialogue Line
                        </button>
                    </div>

                    {mode === 'drama' && (
                        <div className="sticky-bottom">
                            <div className="max-w-xl mx-auto space-y-3">
                                {fullAudio && (
                                    <div className="bg-green-500/10 border border-green-500/20 p-4 rounded-2xl mb-3">
                                        <p className="text-[10px] font-black text-green-500 uppercase mb-2 text-center tracking-widest">Full Story Ready</p>
                                        <audio src={fullAudio} controls />
                                        <button onClick={() => download(fullAudio, "Cinematic_Story.wav")} className="w-full mt-3 py-3 bg-green-500 text-black rounded-xl text-[10px] font-black uppercase">
                                            Download Combined Audio
                                        </button>
                                    </div>
                                )}
                                <button 
                                    onClick={generateCinematicFull}
                                    disabled={fullLoading}
                                    className="w-full py-6 bg-white text-black font-black uppercase text-xs rounded-[2rem] shadow-2xl active:scale-95 transition-all disabled:opacity-50"
                                >
                                    {fullLoading ? <i className="fa-solid fa-circle-notch animate-spin mr-3"></i> : <i className="fa-solid fa-film mr-3"></i>}
                                    {fullLoading ? "Combining Voices..." : "Generate Full Cinematic Audio"}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
