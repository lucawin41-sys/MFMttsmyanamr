<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MFM STUDIO - CINEMATIC EDITION</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: #fff; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
        }

        audio {
            filter: invert(1) hue-rotate(100deg) brightness(1.5);
            width: 100%;
            height: 40px;
        }

        .logo-glow {
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up { animation: slideUp 0.4s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const VOICES = [
            { id: 'Kore', name: 'Kyi Pyar', label: 'ကြည်ပြာ (Female)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=KyiPyar' },
            { id: 'Aoede', name: 'Khing War', label: 'ခိုင်ဝါ (Female)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=KhingWar' },
            { id: 'Leda', name: 'Nan San', label: 'နန်းစံ (Female)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=NanSan' },
            { id: 'Callirrhoe', name: 'May Thazin', label: 'မေသဇင် (Female)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=MayThazin' },
            { id: 'Puck', name: 'Mg Mg', label: 'မောင်မောင် (Male)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=MgMg' },
            { id: 'Charon', name: 'Aung Aung', label: 'အောင်အောင် (Male)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=AungAung' },
            { id: 'Fenrir', name: 'U Thant', label: 'ဦးသန့် (Male)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=UThant' },
            { id: 'Orus', name: 'Htet Arkar', label: 'ထက်အာကာ (Male)', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=HtetArkar' }
        ];

        function App() {
            const [apiKey, setApiKey] = useState(localStorage.getItem('mfm_studio_key') || '');
            const [showSettings, setShowSettings] = useState(!localStorage.getItem('mfm_studio_key'));
            const [mode, setMode] = useState('solo');
            const [blocks, setBlocks] = useState([{ id: Date.now(), text: '', voice: VOICES[0], audio: null, loading: false }]);
            const [fullAudio, setFullAudio] = useState(null);
            const [fullLoading, setFullLoading] = useState(false);

            const saveApiKey = (val) => {
                if (!val) return alert("API Key ထည့်သွင်းပေးပါ။");
                setApiKey(val);
                localStorage.setItem('mfm_studio_key', val);
                setShowSettings(false);
            };

            const download = (url, filename) => {
                const a = document.createElement('a');
                a.href = url; a.download = filename; a.click();
            };

            const fetchTTS = async (text, voiceId) => {
                if (!apiKey) throw new Error("API Key လိုအပ်ပါသည်။");
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text }] }],
                        generationConfig: { 
                            responseModalities: ["AUDIO"], 
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceId } } }
                        }
                    })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error.message);
                const b64 = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                if (!b64) throw new Error("အသံဖိုင် မရရှိပါ။ API Key ကို စစ်ဆေးပါ။");
                
                const bin = atob(b64);
                const pcm = new Int16Array(bin.length / 2);
                for (let i = 0; i < bin.length; i += 2) pcm[i / 2] = (bin.charCodeAt(i + 1) << 8) | bin.charCodeAt(i);
                return pcm;
            };

            const convertToWav = (pcmData) => {
                const buffer = new ArrayBuffer(44 + pcmData.length * 2);
                const view = new DataView(buffer);
                const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
                writeStr(0, 'RIFF'); view.setUint32(4, 32 + pcmData.length * 2, true);
                writeStr(8, 'WAVE'); writeStr(12, 'fmt ');
                view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
                view.setUint32(24, 24000, true); view.setUint32(28, 48000, true);
                view.setUint16(32, 2, true); view.setUint16(34, 16, true);
                writeStr(36, 'data'); view.setUint32(40, pcmData.length * 2, true);
                for (let i = 0; i < pcmData.length; i++) view.setInt16(44 + i * 2, pcmData[i], true);
                return new Blob([buffer], { type: 'audio/wav' });
            };

            const generateSolo = async (id) => {
                const b = blocks.find(x => x.id === id);
                if (!b.text.trim()) return;
                setBlocks(prev => prev.map(x => x.id === id ? { ...x, loading: true } : x));
                try {
                    const pcm = await fetchTTS(b.text, b.voice.id);
                    const url = URL.createObjectURL(convertToWav(pcm));
                    setBlocks(prev => prev.map(x => x.id === id ? { ...x, audio: url, loading: false } : x));
                } catch (e) { 
                    alert(e.message);
                    setBlocks(prev => prev.map(x => x.id === id ? { ...x, loading: false } : x));
                }
            };

            const generateCinematicFull = async () => {
                setFullLoading(true); setFullAudio(null);
                try {
                    const chunks = [];
                    for (const b of blocks) {
                        if (b.text.trim()) {
                            chunks.push(await fetchTTS(b.text, b.voice.id));
                            chunks.push(new Int16Array(12000).fill(0)); // 0.5s pause
                        }
                    }
                    const totalLen = chunks.reduce((a, c) => a + c.length, 0);
                    const merged = new Int16Array(totalLen);
                    let offset = 0;
                    for (const c of chunks) { merged.set(c, offset); offset += c.length; }
                    setFullAudio(URL.createObjectURL(convertToWav(merged)));
                } catch (e) { alert(e.message); } finally { setFullLoading(false); }
            };

            return (
                <div className="max-w-xl mx-auto p-4 pb-48 min-h-screen">
                    <header className="flex justify-between items-center py-6">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-green-500 rounded-xl flex items-center justify-center logo-glow">
                                <i className="fa-solid fa-wand-magic-sparkles text-black"></i>
                            </div>
                            <h1 className="font-black italic text-xl tracking-tighter uppercase">MFM <span className="text-green-500">Studio</span></h1>
                        </div>
                        <button onClick={() => setShowSettings(true)} className="text-zinc-500"><i className="fa-solid fa-gear text-lg"></i></button>
                    </header>

                    <div className="flex bg-zinc-900/50 p-1 rounded-2xl mb-8 border border-white/5">
                        <button onClick={() => setMode('solo')} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${mode === 'solo' ? 'bg-white text-black' : 'text-zinc-500'}`}>Solo Mode</button>
                        <button onClick={() => setMode('drama')} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${mode === 'drama' ? 'bg-green-500 text-black' : 'text-zinc-500'}`}>Cinematic Mix</button>
                    </div>

                    <div className="space-y-6">
                        {blocks.map((b, idx) => (
                            <div key={b.id} className="glass-card p-6 border-white/5 hover:border-green-500/20 transition-all">
                                <div className="flex items-center justify-between mb-5">
                                    <div className="flex items-center gap-4">
                                        <img src={b.voice.avatar} className="w-12 h-12 rounded-xl border border-green-500/20" />
                                        <div>
                                            <h3 className="text-sm font-black text-white">{b.voice.name}</h3>
                                            <p className="text-[10px] text-zinc-500 uppercase font-bold">{b.voice.label}</p>
                                        </div>
                                    </div>
                                    {blocks.length > 1 && <button onClick={() => setBlocks(blocks.filter(x => x.id !== b.id))} className="text-red-500 text-xs"><i className="fa-solid fa-trash"></i></button>}
                                </div>
                                <select 
                                    className="w-full bg-zinc-950 border border-white/5 rounded-xl p-3 text-xs text-white mb-4 outline-none"
                                    value={b.voice.id}
                                    onChange={(e) => setBlocks(blocks.map(x => x.id === b.id ? {...x, voice: VOICES.find(v => v.id === e.target.value)} : x))}
                                >
                                    {VOICES.map(v => <option key={v.id} value={v.id}>{v.label}</option>)}
                                </select>
                                <textarea 
                                    className="w-full bg-transparent border-b border-white/10 p-2 text-sm text-zinc-200 outline-none min-h-[100px] mb-4"
                                    placeholder="ပြောလိုသော စာသားရိုက်ပါ..."
                                    value={b.text}
                                    onChange={(e) => setBlocks(blocks.map(x => x.id === b.id ? {...x, text: e.target.value} : x))}
                                />
                                {mode === 'solo' && (
                                    <div className="space-y-4">
                                        {b.audio && <div className="flex gap-2 items-center"><audio src={b.audio} controls /><button onClick={() => download(b.audio, `Solo_${idx+1}.wav`)} className="p-3 bg-zinc-800 rounded-xl"><i className="fa-solid fa-download text-[10px]"></i></button></div>}
                                        <button onClick={() => generateSolo(b.id)} disabled={b.loading || !apiKey} className="w-full py-4 bg-white text-black font-black text-[10px] uppercase rounded-xl">
                                            {b.loading ? <i className="fa-solid fa-circle-notch animate-spin"></i> : "Generate Voice"}
                                        </button>
                                    </div>
                                )}
                            </div>
                        ))}
                        <button onClick={() => setBlocks([...blocks, { id: Date.now(), text: '', voice: VOICES[0], audio: null, loading: false }])} className="w-full py-6 border-2 border-dashed border-white/5 rounded-3xl text-zinc-600 text-[10px] uppercase font-black hover:text-green-500 transition-all">+ Add Next Character</button>
                    </div>

                    {mode === 'drama' && (
                        <div className="fixed bottom-0 left-0 right-0 p-6 bg-black/90 z-40">
                            <div className="max-w-xl mx-auto space-y-4">
                                {fullAudio && (
                                    <div className="glass-card p-4 animate-slide-up border-green-500/30">
                                        <p className="text-[8px] text-zinc-500 font-black uppercase text-center mb-2 tracking-widest">Full Mix Ready</p>
                                        <div className="flex gap-3"><audio src={fullAudio} controls /><button onClick={() => download(fullAudio, "Cinematic_Story.wav")} className="px-6 bg-green-500 text-black rounded-xl font-black text-[10px]"><i className="fa-solid fa-cloud-arrow-down"></i></button></div>
                                    </div>
                                )}
                                <button onClick={generateCinematicFull} disabled={fullLoading || !apiKey} className="w-full py-6 bg-white text-black font-black uppercase text-xs rounded-full shadow-2xl">
                                    {fullLoading ? <i className="fa-solid fa-circle-notch animate-spin mr-3"></i> : <i className="fa-solid fa-film mr-3 text-green-600"></i>}
                                    {fullLoading ? "Rendering..." : "Export Full Cinematic Mix"}
                                </button>
                            </div>
                        </div>
                    )}

                    {showSettings && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/95 backdrop-blur-xl">
                            <div className="w-full max-w-sm glass-card p-10 text-center border-green-500/30">
                                <h2 className="text-xl font-black uppercase mb-6">API <span className="text-green-500">Access</span></h2>
                                <input type="password" id="keyField" defaultValue={apiKey} className="w-full bg-zinc-950 border border-white/10 rounded-2xl p-4 text-center text-sm outline-none mb-4 text-green-400" placeholder="Paste Gemini API Key Here..." />
                                <button onClick={() => saveApiKey(document.getElementById('keyField').value)} className="w-full py-4 bg-green-500 text-black font-black text-[10px] uppercase rounded-xl shadow-lg">Save & Continue</button>
                                <a href="https://aistudio.google.com/app/apikey" target="_blank" className="block mt-6 text-[9px] text-zinc-500 underline uppercase tracking-widest">Get Free API Key</a>
                                {apiKey && <button onClick={() => setShowSettings(false)} className="mt-8 text-[9px] text-zinc-700 uppercase font-black">Close</button>}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
